# Main service account
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "application.serviceAccountName" $ }}
  namespace: {{ include "install.namespace" $ }}
  {{- if eq .Values.cloud "aws"}}
  annotations:
    {{- with .Values.services.icc.elasticache}}
    eks.amazonaws.com/role-arn: {{ .role_arn }}
    {{- end}}
  {{- end}}

{{- if and .Values.services.workflow .Values.services.workflow.deploy }}
# Workflow service needs to validate K8s SA tokens via TokenReview API
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "application.serviceAccountName" $ }}-tokenreview
rules:
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "application.serviceAccountName" $ }}-tokenreview
subjects:
  - kind: ServiceAccount
    name: {{ include "application.serviceAccountName" $ }}
    namespace: {{ include "install.namespace" $ }}
roleRef:
  kind: ClusterRole
  name: {{ include "application.serviceAccountName" $ }}-tokenreview
  apiGroup: rbac.authorization.k8s.io
{{- end }}

{{- $accountName := "plt-pod-manager" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $accountName }}
  namespace: {{ include "install.namespace" $ }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $accountName }}
rules:
  - apiGroups:
      - ""
      - apps
      - networking.k8s.io
    resources:
      - pods
      - deployments
      - replicasets
      - replicationcontrollers
      - ingresses
      - services
    verbs:
      - get
      - list
  - apiGroups:
      - ""
      - apps
    resources:
      - deployments
      - replicasets
      - replicationcontrollers
      - pods
    verbs:
      - update
      - patch
  # Skew protection auto-cleanup: delete expired Deployments and Services
  - apiGroups:
      - ""
      - apps
    resources:
      - deployments
      - services
    verbs:
      - delete
  # Gateway API - for skew protection (opt-in)
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - httproutes
    verbs:
      - get
      - list
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gateways
    verbs:
      - get
      - list

{{- $namespaces := include "install.allNamespaces" . | trim | splitList "\n" }}
{{- range $namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $accountName }}-{{ . }}
  namespace: {{ . }}
subjects:
  - kind: ServiceAccount
    name: {{ $accountName }}
    namespace: {{ include "install.namespace" $ }}
roleRef:
  kind: ClusterRole
  name: {{ $accountName }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
